{% load static %}
<div class="social-share">
  <span class="share-label">Share:</span>
  <a href="https://twitter.com/intent/tweet?text={{ post.title|urlencode }}&url={{ request.build_absolute_uri }}" target="_blank" class="share-btn share-twitter"><i class="bi bi-twitter-x"></i></a>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ request.build_absolute_uri }}" target="_blank" class="share-btn share-linkedin"><i class="bi bi-linkedin"></i></a>
  <button class="share-btn share-copy" onclick="navigator.clipboard.writeText(window.location.href); this.innerHTML='<i class=\'bi bi-check-lg\'></i>'; setTimeout(()=>this.innerHTML='<i class=\'bi bi-link-45deg\'></i>',2000)">
    <i class="bi bi-link-45deg"></i>
  </button>
</div>
